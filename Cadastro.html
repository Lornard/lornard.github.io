<body>
    <form action="https://formsubmit.co/silveira.gabriel9001@edu.pucrs.br" method="POST">
        <fieldset>
            <legend>Tutor</legend>
            <label for="txtNome">Nome: </label>
            <input type="text" id="txtNome" placeholder="João da Silva" required/>
            <br/>
            <label for="txtEndereco">Endereço: </label>
            <input type="text" id="txtEndereco" placeholder="Rua Ataliba, 238" required/>
            <br/>
            <label for="numCPF">CPF: </label>
            <input type="number" id="numCPF" placeholder="01234567890" required/>
            <br/>
            <fieldset>
                <legend>Sexo:</legend>
                <input type="radio" name="sexo" id="rdMasculino" value="Masculino" checked>Masculino</input>
                <input type="radio" name="sexo" id="rdFeminino" value="Feminino">Feminino</input>
            </fieldset>
            <br/>
            <label for="numTelefone">Telefone: </label>
            <input type="tel" id="numTelefone" placeholder="999999999" />
            <br/>
            <label for="txtEmail">E-mail</label>
            <input type="email" id="txtEmail" placeholder="pet@shop.com" />
            <br/>
        </fieldset>
        <fieldset>
            <legend>Pet</legend>
            <label for="txtNomePet">Nome do Pet: </label>
            <input type="text" id="txtNomePet" placeholder="Toto" required/>
            <br/>
            <label for="txtRaca">Raça:</label>
            <input type="text" id="txtRaca" placeholder="SRD" required/>
            <br/>
            <label for="numIdade">Idade: </label>
            <input type="number" id="numIdade" placeholder="2" required/>
        </fieldset>
        <button type="submit">Enviar</button>
    </form>
</body>
